name: nightly PROCESS

# Consolidated nightly job: for every unprocessed asset it runs all applicable
# jobs (resolutions, GLTF, Godot GLTF), marks the asset for the online and local
# asset libraries during the shared unpack step, and triggers a reindex.
#
# The per-task nightly workflows (nightly_resolutions, nightly_gltf,
# nightly_gltf_godot) are kept as manual (workflow_dispatch) fallbacks.

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

env:
  BLENDERKIT_SERVER: 'https://www.blenderkit.com'
  BLENDERKIT_API_KEY: '${{ secrets.BLENDERKIT_API_KEY }}'
  BLENDER_PATH: '/home/headless/blender/blender'
  BLENDERS_PATH: '/home/headless/blenders'
  MAX_ASSET_COUNT: 200

jobs:
  PROCESS:
    runs-on: ubuntu-latest
    container: ghcr.io/blenderkit/headless-blender:blender-5.0 # LATEST STABLE
    steps:
      - uses: actions/checkout@v4
      - name: Install lsb-release
        run: apt-get update && apt-get install -y lsb-release python3-pip
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pip install -r requirements.txt
      - name: Process assets (resolutions, GLTF, marking, reindex)
        run: python3 process_asset.py
