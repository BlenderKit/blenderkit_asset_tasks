name: manual RESOLUTION

on:
  workflow_dispatch:
    inputs:
      asset_base_id:
        description: 'Asset Base ID to generate resolution for (leave empty if using custom_search_params)'
        required: false
        type: string
      custom_search_params:
        description: 'Custom search params as JSON or key=value;key2=value2 (values may contain commas, e.g. asset_type=model,hdr;author_id=123)'
        required: false
        type: string
      max_asset_count:
        description: 'Maximum number of assets to process (default: 200)'
        required: false
        type: string
        default: '200'

env:
  BLENDERKIT_SERVER: 'https://www.blenderkit.com'
  BLENDERKIT_API_KEY: '${{ secrets.BLENDERKIT_API_KEY }}'
  BLENDER_PATH: '/home/headless/blender/blender'
  MAX_ASSET_COUNT: '${{ inputs.max_asset_count }}'
  ASSET_BASE_ID: '${{ inputs.asset_base_id }}'
  CUSTOM_SEARCH_PARAMS: '${{ inputs.custom_search_params }}'

jobs:
  RESOLUTIONS:
    runs-on: ubuntu-latest
    container: ghcr.io/blenderkit/headless-blender:blender-5.0 # LATEST STABLE
    steps:
      - uses: actions/checkout@v4
      - name: Install lsb-release
        run: apt-get update && apt-get install -y lsb-release python3-pip
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pip install -r requirements.txt
      - name: Generate resolutions
        run: python3 generate_resolutions.py
