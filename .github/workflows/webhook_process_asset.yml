name: Process Asset
run-name: Process ${{github.event.inputs.asset_type || github.event.client_payload.asset_type}} | ${{ github.event.inputs.asset_base_id || github.event.client_payload.asset_base_id }} | ${{ github.event.inputs.verification_status || github.event.client_payload.verification_status }} | ${{ github.event.inputs.is_private || github.event.client_payload.is_private }} | ${{ github.event.inputs.source_app_version_xy || github.event.client_payload.source_app_version_xy }}

on:
  workflow_dispatch:
    inputs:
      asset_base_id:
        description: 'Asset Base ID'
        required: true
      asset_type:
        description: 'Asset Type'
        default: 'model'
        required: true
        type: choice
        options:
        - model
        - material
        - scene
        - hdr
        - brush
        - nodegroup
        - printable
      verification_status:
        description: 'Verification Status of the Asset'
        default: 'validated'
      is_private:
        description: 'Asset Is Private'
        type: boolean
      source_app_version_xy:
        description: 'Source app version X.Y (optional, defaults to latest stable)'
        default: '5.0'
        required: false

  repository_dispatch:
    types: [process-asset]

env:
  BLENDERKIT_SERVER: 'https://www.blenderkit.com'
  BLENDERKIT_API_KEY: ${{ secrets.BLENDERKIT_API_KEY }}
  ASSET_BASE_ID: ${{ github.event.inputs.asset_base_id || github.event.client_payload.asset_base_id }}

jobs:
  PROCESS:
    name: Public & Validated -> process (resolutions, GLTF, Godot GLTF, marking, reindex)
    runs-on: ubuntu-latest
    env:
      BLENDERS_PATH: /home/headless/blenders
    if: (github.event.inputs.verification_status == 'validated' || github.event.client_payload.verification_status == 'validated') &&
        (github.event.inputs.is_private != 'true' && github.event.client_payload.is_private != 'true')
    container: ghcr.io/blenderkit/headless-blender:blender-${{ github.event.inputs.source_app_version_xy || github.event.client_payload.source_app_version_xy || '5.0'}}

    steps:
      - uses: actions/checkout@v4
      - name: Install lsb-release
        run: apt-get update && apt-get install -y lsb-release python3-pip
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pip install -r requirements.txt
      - name: Set BLENDER_PATH
        run: echo "BLENDER_PATH=/home/headless/blender/blender" >> $GITHUB_ENV
      - name: Process asset (resolutions, GLTF, marking and reindex)
        run: python3 process_asset.py


  CLEAN_MANUFACTURER_TAGS:
    name: Public Uploaded/Validated Assets -> clean manufacturer tags
    runs-on: ubuntu-latest
    if: contains(fromJSON('["model","material","scene","printable"]'), github.event.inputs.asset_type || github.event.client_payload.asset_type) &&
      contains(fromJSON('["uploaded","validated"]'), github.event.inputs.verification_status || github.event.client_payload.verification_status) &&
      (github.event.inputs.is_private != 'true' && github.event.client_payload.is_private != 'true')
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ai.txt
      - name: Clean manufacturer tags
        run: python clean_manufacturer_tags.py
