name: manual PROCESS

# Manually start the consolidated asset processing on demand, without waiting
# for the nightly schedule. Just click "Run workflow" — every input is optional
# and defaulted, so you can start it without selecting anything.
#
# Optional inputs let you target a single asset or narrow the search; leave them
# empty to process the normal bulk backlog (oldest + newest unprocessed assets).

on:
  workflow_dispatch:
    inputs:
      asset_base_id:
        description: 'Asset Base ID to process (leave empty to process the bulk backlog)'
        required: false
        type: string
      custom_search_params:
        description: 'Custom search params as JSON or key=value;key2=value2 (values may contain commas, e.g. asset_type=model,hdr)'
        required: false
        type: string
      max_asset_count:
        description: 'Maximum number of assets to process (default: 200)'
        required: false
        type: string
        default: '200'

env:
  BLENDERKIT_SERVER: 'https://www.blenderkit.com'
  BLENDERKIT_API_KEY: '${{ secrets.BLENDERKIT_API_KEY }}'
  BLENDER_PATH: '/home/headless/blender/blender'
  BLENDERS_PATH: '/home/headless/blenders'
  MAX_ASSET_COUNT: '${{ inputs.max_asset_count }}'
  ASSET_BASE_ID: '${{ inputs.asset_base_id }}'
  CUSTOM_SEARCH_PARAMS: '${{ inputs.custom_search_params }}'

jobs:
  PROCESS:
    runs-on: ubuntu-latest
    # Multi-version image: a bulk run mixes assets from many source Blender
    # versions, so processing picks the matching (never newer) Blender per asset.
    container: blenderkit/headless-blender:multi-version
    steps:
      - uses: actions/checkout@v4
      - name: Install lsb-release
        run: apt-get update && apt-get install -y lsb-release python3-pip
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pip install -r requirements.txt
      - name: Process assets (resolutions, GLTF, marking, reindex)
        run: python3 process_asset.py
